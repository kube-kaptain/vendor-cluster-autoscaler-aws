apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kaptain.org/helm-upstream-chart: cluster-autoscaler-9.58.0
    kaptain.org/generated-by: Generated by Kaptain vendor-helm-render-and-process
    kaptain.org/source-repository: kube-kaptain/vendor-cluster-autoscaler-aws
  labels:
    app.kubernetes.io/instance: "${ProjectName}"
    app.kubernetes.io/name: "${ProjectName}"
    app.kubernetes.io/managed-by: "Kaptain"
    app: ${ProjectName}
    app.kubernetes.io/version: "${Version}"
    app.kubernetes.io/part-of: ${ProductName}
    kaptain.org/environment: ${Environment}
    kaptain.org/product: ${ProductName}
    kaptain.org/project-name: ${ProjectName}
    kaptain.org/version: "${Version}"
    kaptain.org/owner: kube-kaptain
  name: ${ProjectName}
  namespace: ${Environment}
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/instance: "${ProjectName}"
      app.kubernetes.io/name: "${ProjectName}"
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: "${ProjectName}"
        app.kubernetes.io/name: "${ProjectName}"
    spec:
      priorityClassName: "system-cluster-critical"
      dnsPolicy: "ClusterFirst"
      containers:
        - name: ${ProjectName}
          image: "${VendorClusterAutoscalerAws/EnvironmentDockerRegistryAndNamespace}/${DockerImageName}:${DockerTagClusterAutoscaler}"
          imagePullPolicy: "IfNotPresent"
          command:
            - ./cluster-autoscaler
            - --cloud-provider=aws
            - --namespace=${Environment}
            - --node-group-auto-discovery=asg:tag=k8s.io/cluster-autoscaler/enabled,k8s.io/cluster-autoscaler/${VendorClusterAutoscalerAws/ClusterName}
            - --balance-similar-node-groups=${VendorClusterAutoscalerAws/BalanceSimilarNodeGroups}
            - --expander=${VendorClusterAutoscalerAws/Expander}
            - --expendable-pods-priority-cutoff=${VendorClusterAutoscalerAws/ExpendablePodsPriorityCutoff}
            - --ignore-daemonsets-utilization=${VendorClusterAutoscalerAws/IgnoreDaemonsetsUtilization}
            - --ignore-mirror-pods-utilization=${VendorClusterAutoscalerAws/IgnoreMirrorPodsUtilization}
            - --max-drain-parallelism=${VendorClusterAutoscalerAws/MaxDrainParallelism}
            - --max-graceful-termination-sec=${VendorClusterAutoscalerAws/MaxGracefulTerminationSec}
            - --max-node-provision-time=${VendorClusterAutoscalerAws/MaxNodeProvisionTime}
            - --max-nodes-total=${VendorClusterAutoscalerAws/MaxNodesTotal}
            - --max-scale-down-parallelism=${VendorClusterAutoscalerAws/MaxScaleDownParallelism}
            - --max-total-unready-percentage=${VendorClusterAutoscalerAws/MaxTotalUnreadyPercentage}
            - --new-pod-scale-up-delay=${VendorClusterAutoscalerAws/NewPodScaleUpDelay}
            - --node-delete-delay-after-taint=${VendorClusterAutoscalerAws/NodeDeleteDelayAfterTaint}
            - --node-deletion-batcher-interval=${VendorClusterAutoscalerAws/NodeDeletionBatcherInterval}
            - --node-deletion-delay-timeout=${VendorClusterAutoscalerAws/NodeDeletionDelayTimeout}
            - --ok-total-unready-count=${VendorClusterAutoscalerAws/OkTotalUnreadyCount}
            - --scale-down-candidates-pool-min-count=${VendorClusterAutoscalerAws/ScaleDownCandidatesPoolMinCount}
            - --scale-down-candidates-pool-ratio=${VendorClusterAutoscalerAws/ScaleDownCandidatesPoolRatio}
            - --scale-down-delay-after-add=${VendorClusterAutoscalerAws/ScaleDownDelayAfterAdd}
            - --scale-down-delay-after-delete=${VendorClusterAutoscalerAws/ScaleDownDelayAfterDelete}
            - --scale-down-delay-after-failure=${VendorClusterAutoscalerAws/ScaleDownDelayAfterFailure}
            - --scale-down-delay-type-local=${VendorClusterAutoscalerAws/ScaleDownDelayTypeLocal}
            - --scale-down-enabled=${VendorClusterAutoscalerAws/ScaleDownEnabled}
            - --scale-down-gpu-utilization-threshold=${VendorClusterAutoscalerAws/ScaleDownGpuUtilizationThreshold}
            - --scale-down-non-empty-candidates-count=${VendorClusterAutoscalerAws/ScaleDownNonEmptyCandidatesCount}
            - --scale-down-simulation-timeout=${VendorClusterAutoscalerAws/ScaleDownSimulationTimeout}
            - --scale-down-unneeded-time=${VendorClusterAutoscalerAws/ScaleDownUnneededTime}
            - --scale-down-unready-enabled=${VendorClusterAutoscalerAws/ScaleDownUnreadyEnabled}
            - --scale-down-unready-time=${VendorClusterAutoscalerAws/ScaleDownUnreadyTime}
            - --scale-down-utilization-threshold=${VendorClusterAutoscalerAws/ScaleDownUtilizationThreshold}
            - --scale-up-from-zero=${VendorClusterAutoscalerAws/ScaleUpFromZero}
            - --scan-interval=${VendorClusterAutoscalerAws/ScanInterval}
            - --skip-nodes-with-custom-controller-pods=${VendorClusterAutoscalerAws/SkipNodesWithCustomControllerPods}
            - --skip-nodes-with-local-storage=${VendorClusterAutoscalerAws/SkipNodesWithLocalStorage}
            - --skip-nodes-with-system-pods=${VendorClusterAutoscalerAws/SkipNodesWithSystemPods}
            - --v=${VendorClusterAutoscalerAws/LogVerbosity}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SERVICE_ACCOUNT
              valueFrom:
                fieldRef:
                  fieldPath: spec.serviceAccountName
            - name: AWS_REGION
              value: "${VendorClusterAutoscalerAws/AwsRegion}"
            - name: GOMEMLIMIT
              value: ${VendorClusterAutoscalerAws/GoMemLimit}
          livenessProbe:
            httpGet:
              path: /health-check
              port: 8085
            periodSeconds: ${VendorClusterAutoscalerAws/ProbeLivenessPeriod}
            timeoutSeconds: ${VendorClusterAutoscalerAws/ProbeLivenessTimeoutSeconds}
            failureThreshold: ${VendorClusterAutoscalerAws/ProbeLivenessFailureThreshold}
          ports:
            - containerPort: 8085
          resources:
            requests:
              cpu: "${VendorClusterAutoscalerAws/CpuRequest}"
              memory: "${VendorClusterAutoscalerAws/Memory}"
            limits:
              memory: "${VendorClusterAutoscalerAws/Memory}"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          startupProbe:
            httpGet:
              path: /health-check
              port: 8085
            periodSeconds: ${VendorClusterAutoscalerAws/ProbeStartupPeriod}
            timeoutSeconds: ${VendorClusterAutoscalerAws/ProbeStartupTimeoutSeconds}
            failureThreshold: ${VendorClusterAutoscalerAws/ProbeStartupFailureThreshold}
      serviceAccountName: ${ProjectName}
      tolerations: []
      securityContext:
        runAsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
